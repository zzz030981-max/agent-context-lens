name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the CLI package to npm using trusted publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@latest
      - run: node --version
      - run: npm --version
      - run: node -e "if (Number(process.versions.node.split('.')[0]) < 24) process.exit(1)"
      - run: node -e "const { execSync } = require('node:child_process'); const [major, minor] = execSync('npm --version').toString().trim().split('.').map(Number); if (major < 11 || (major === 11 && minor < 5)) process.exit(1)"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run test:pack
      - run: npm audit --audit-level=high
      - run: npm run release:dry-run
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v0.1.1 release/* --target "$GITHUB_SHA" --title "Agent Context Lens v0.1.1" --generate-notes
      - name: Publish to npm
        if: ${{ inputs.publish_npm }}
        run: npm publish -w agent-context-lens
