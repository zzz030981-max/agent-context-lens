name: Release

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish the CLI package to npm using trusted publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run test:pack
      - run: npm audit --audit-level=high
      - run: |
          mkdir release
          git archive --format=zip --output release/agent-context-lens-v0.1.1-source.zip HEAD
          npm pack -w agent-context-lens --pack-destination release
          sha256sum release/* > release/SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v0.1.1 release/* --target "$GITHUB_SHA" --title "Agent Context Lens v0.1.1" --generate-notes
      - name: Publish to npm
        if: ${{ inputs.publish_npm }}
        run: npm publish -w agent-context-lens --provenance
