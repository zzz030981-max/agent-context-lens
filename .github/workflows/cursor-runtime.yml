name: Cursor runtime verification

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  credential-check:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -n "$CURSOR_API_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
  verify:
    needs: credential-check
    if: needs.credential-check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    env:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CURSOR_VERSION: 2026.07.09-a3815c0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false
      - run: mkdir -p "$RUNNER_TEMP/cursor-agent" && curl --fail --location --silent --show-error "https://downloads.cursor.com/lab/$CURSOR_VERSION/linux/x64/agent-cli-package.tar.gz" | tar --strip-components=1 -xzf - -C "$RUNNER_TEMP/cursor-agent"
      - run: npm ci
      - run: CURSOR_AGENT_BIN="$RUNNER_TEMP/cursor-agent/cursor-agent" npm run cursor:verify | tee cursor-runtime-evidence.json
      - run: cat cursor-runtime-evidence.json >> "$GITHUB_STEP_SUMMARY"
  skipped:
    needs: credential-check
    if: needs.credential-check.outputs.configured != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Cursor runtime verification skipped: CURSOR_API_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"
