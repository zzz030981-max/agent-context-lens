name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, node: 20 }
          - { os: windows-latest, node: 20 }
          - { os: macos-latest, node: 20 }
          - { os: ubuntu-latest, node: 22 }
          - { os: ubuntu-latest, node: 24 }
          - { os: windows-latest, node: 24 }
          - { os: macos-latest, node: 24 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run versions:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
  package-smoke:
    name: package smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run versions:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run package:inspect
      - run: npm run test:pack
      - run: npm run test:server-pack
      - run: npm run release:dry-run
      - run: npm audit --audit-level=high
  ci-success:
    name: CI success
    if: always()
    needs: [validate, package-smoke]
    runs-on: ubuntu-latest
    steps:
      - env:
          VALIDATE_RESULT: ${{ needs.validate.result }}
          PACKAGE_RESULT: ${{ needs.package-smoke.result }}
        run: test "$VALIDATE_RESULT" = success && test "$PACKAGE_RESULT" = success
