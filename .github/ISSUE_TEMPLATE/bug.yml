name: Bug report
description: Report an incorrect trace or runtime failure.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the target agent, target file, and expected instruction chain.
    validations: {required: true}
  - type: input
    id: version
    attributes: {label: Agent Context Lens version}
    validations: {required: true}
  - type: input
    id: platform
    attributes: {label: OS and Node.js version}
    validations: {required: true}
  - type: textarea
    id: fixture
    attributes:
      label: Minimal repository fixture
      description: Remove secrets and provide the smallest reproducible folder structure.
